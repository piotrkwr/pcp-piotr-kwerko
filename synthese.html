        .synthese-container {

            margin: 140px auto 80px;

            z-index: 1;
        }

        h1 { font-family: 'Tektur', sans-serif; border-bottom: 4px solid #0f056b; padding-bottom: 10px; margin-bottom: 35px; }

        .table-wrapper { overflow-x: auto; margin-top: 20px; }
        .synthese-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; border: 1px solid #ddd; }
        
        .synthese-table th { 
            background-color: #0f056b; 
            color: #fff; 
            padding: 12px; 
            font-family: 'Tektur', sans-serif; 
            border: 1px solid #ddd;
        }
